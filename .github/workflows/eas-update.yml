name: EAS OTA Update

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      channel:
        description: "EAS update branch/channel"
        required: true
        default: "production"
      message:
        description: "Update message"
        required: false
        default: "Automated OTA update"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate EXPO_TOKEN is configured
        shell: bash
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "EXPO_TOKEN secret is missing. Add it in GitHub -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Verify Expo authentication
        run: npx eas-cli whoami --non-interactive

      - name: Publish OTA update
        shell: bash
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
          MESSAGE: ${{ github.event.inputs.message }}
        run: |
          CHANNEL="${CHANNEL:-production}"
          MESSAGE="${MESSAGE:-OTA update from ${GITHUB_SHA::7}}"

          npx eas-cli update \
            --branch "$CHANNEL" \
            --message "$MESSAGE" \
            --non-interactive
