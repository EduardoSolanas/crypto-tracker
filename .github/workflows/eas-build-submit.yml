name: EAS Build And Submit

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: "EAS build profile"
        required: true
        default: "production"
      auto_submit:
        description: "Auto-submit after build"
        required: true
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build and optionally submit
        shell: bash
        run: |
          PLATFORM="${{ github.event.inputs.platform }}"
          PROFILE="${{ github.event.inputs.profile }}"
          AUTO_SUBMIT="${{ github.event.inputs.auto_submit }}"

          SUBMIT_FLAG=""
          if [ "$AUTO_SUBMIT" = "true" ]; then
            SUBMIT_FLAG="--auto-submit"
          fi

          npx eas-cli build \
            --platform "$PLATFORM" \
            --profile "$PROFILE" \
            --non-interactive \
            $SUBMIT_FLAG
