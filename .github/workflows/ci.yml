name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Guard React renderer versions
        run: npm run ci:guard

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand --no-cache

  release-version:
    needs: test-and-lint
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.next_version }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Bump synchronized app version
        id: bump
        shell: bash
        run: |
          VERSION_JSON=$(node scripts/bump-release-version.mjs)
          echo "$VERSION_JSON"
          NEXT_VERSION=$(echo "$VERSION_JSON" | node -e "let b='';process.stdin.on('data',d=>b+=d).on('end',()=>process.stdout.write(JSON.parse(b).nextVersion));")
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag release version
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No version changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          VERSION="${{ steps.bump.outputs.next_version }}"
          TAG="v${VERSION}"

          # Idempotency guard: CI reruns should not fail if this version tag already exists.
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null || git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists. Skipping release commit/tag."
            exit 0
          fi

          git add package.json package-lock.json app.json
          git commit -m "chore(release): ${TAG} [skip ci]"
          git tag "${TAG}"

          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "${TAG}"

  resolve-version:
    name: Resolve App Version
    needs: [test-and-lint, release-version]
    if: always() && !cancelled() && needs.test-and-lint.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          VERSION="${{ needs.release-version.outputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using app version: $VERSION"

  android-full-build:
    name: Build Android Binary
    needs: [test-and-lint, release-version, resolve-version]
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android production binary
        run: |
          echo "Starting Android build for v${{ needs.resolve-version.outputs.version }}"
          npx eas-cli build --platform android --profile production --non-interactive

  deploy-ota-test:
    name: Deploy OTA Test Channel
    needs: [test-and-lint, resolve-version]
    if: always() && !cancelled() && needs.test-and-lint.result == 'success' && needs.resolve-version.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Expo token availability
        id: expo_token
        shell: bash
        run: |
          if [ -n "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Expo and EAS
        if: steps.expo_token.outputs.has_token == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA test update
        if: steps.expo_token.outputs.has_token == 'true'
        run: |
          npx eas-cli update --branch test --message "v${{ needs.resolve-version.outputs.version }} test update ${GITHUB_REF_NAME} ${GITHUB_SHA::7}" --non-interactive

      - name: Skip test OTA (no EXPO_TOKEN)
        if: steps.expo_token.outputs.has_token != 'true'
        run: echo "EXPO_TOKEN not set; skipping test OTA publish."

  deploy-ota:
    name: Deploy OTA Update
    needs: [test-and-lint, release-version, resolve-version]
    # Run only on push to main/master, and if it's not a bot/skip-ci commit
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA production update
        run: |
          npx eas-cli update --branch production --message "v${{ needs.resolve-version.outputs.version }} automated production update from CI" --non-interactive
